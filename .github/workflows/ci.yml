name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + offline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (project + dev group)
        run: uv sync --dev

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      # Offline subset only: tests/examples are marked `integration` (and some
      # `docker`) and need real AWS creds + Docker + ROLE_ARN, so they are excluded
      # here. They run separately (locally / a creds-bearing runner).
      - name: Run offline tests
        run: uv run pytest -m "not integration"

  build:
    name: Build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so setuptools-scm can derive a version.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist + wheel
        run: uv build

      - name: Verify the wheel ships the engine subpackage + py.typed
        run: |
          python -m zipfile -l dist/*.whl | grep -q "workflow_runner/workflow_runner.py"
          python -m zipfile -l dist/*.whl | grep -q "py.typed"

  docs:
    name: Build docs (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so setuptools-scm gives a real version (conf.py
          # reads it for the docs title), matching the Read the Docs build.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync project + docs extra
        run: uv sync --extra docs

      # -W turns warnings into errors (broken links, bad toctree, autodoc import
      # failures), mirroring `sphinx.fail_on_warning` in .readthedocs.yaml.
      - name: Build the documentation site
        run: uv run sphinx-build -W -b html docs docs/_build/html
